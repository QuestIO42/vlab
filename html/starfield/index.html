<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfield Example</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        canvas {
            display: block;
        }
        
        #qrcode-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        
        #qrcode-container:hover {
            animation: none;
            transform: translateY(0px);
        }
        
        #qrcode {
            width: 150px;
            height: 150px;
        }
        
        #qrcode-label {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: #333;
            font-weight: bold;
        }
        
        #close-qrcode {
            position: absolute;
            top: 5px;
            right: 8px;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #666;
            padding: 2px 6px;
        }
        
        #close-qrcode:hover {
            color: #000;
        }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>
    
    <div id="qrcode-container">
        <button id="close-qrcode" onclick="closeQRCode()">&times;</button>
        <div id="qrcode"></div>
        <div id="qrcode-label">Scan to Visit</div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="starfield.js"></script>
    <script>
        // Initialize floating QR code
        function initQRCode() {
            const qrContainer = document.getElementById('qrcode-container');
            const qrElement = document.getElementById('qrcode');
            
            // Create QR code with current page URL
            const currentURL = window.location.href;
            
            new QRCode(qrElement, {
                text: currentURL,
                width: 150,
                height: 150,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
            
            // Make QR code draggable
            makeDraggable(qrContainer);
        }
        
        // Close QR code function
        function closeQRCode() {
            document.getElementById('qrcode-container').style.display = 'none';
        }
        
        // Make element draggable
        function makeDraggable(element) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            
            element.onmousedown = dragMouseDown;
            
            function dragMouseDown(e) {
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }
            
            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                element.style.top = (element.offsetTop - pos2) + "px";
                element.style.left = (element.offsetLeft - pos1) + "px";
                element.style.bottom = 'auto';
                element.style.right = 'auto';
            }
            
            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }
        
        // Initialize when page loads
        window.addEventListener('load', initQRCode);
    </script>
</body>
</html>
